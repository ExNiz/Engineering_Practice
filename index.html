<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Engineering Pulse</title>
<style>
:root{
  --bg:#0a0d13;--surface:#111520;--card:#161c2a;--border:#1e2840;
  --accent:#4f8ef7;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;
  --text:#e2e8f0;--muted:#7a8599;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

/* PASSWORD */
#pw{display:flex;align-items:center;justify-content:center;height:100vh;
  background:radial-gradient(ellipse at 30% 25%,rgba(79,142,247,.10) 0%,transparent 55%),var(--bg);}
.pw-box{width:360px;background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:40px 36px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.5);}
.pw-brand{font-size:24px;font-weight:800;margin-bottom:4px;}
.pw-brand b{color:var(--accent);}
.pw-tag{font-size:11px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:28px;}
.pw-lk{font-size:32px;margin-bottom:18px;}
.pw-inp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;
  padding:12px 16px;color:#fff;font-size:15px;text-align:center;letter-spacing:.18em;outline:none;
  margin-bottom:12px;transition:border-color .2s;}
.pw-inp:focus{border-color:var(--accent);}
.pw-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:9px;
  padding:12px;font-weight:700;font-size:14px;cursor:pointer;transition:opacity .2s;}
.pw-btn:hover{opacity:.85;}
.pw-err{color:var(--red);font-size:12px;margin-top:8px;min-height:16px;}

/* LAYOUT */
#app{display:none;height:100vh;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:50px;
  background:#080b11;border-bottom:1px solid var(--border);flex-shrink:0;}
.brand{font-size:17px;font-weight:800;}.brand b{color:var(--accent);}
.topbar-right{display:flex;gap:8px;align-items:center;}
.chip{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:4px 11px;font-size:11px;color:var(--muted);}
.chip strong{color:var(--text);font-weight:700;}

/* FILTERS */
.fbar{display:flex;align-items:center;gap:8px;padding:9px 20px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.flbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);}
select.fsel{background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:5px 9px;color:var(--text);font-size:12px;outline:none;cursor:pointer;}
select.fsel:focus{border-color:var(--accent);}
.freset{all:unset;box-sizing:border-box;font-size:11px;color:var(--accent);cursor:pointer;
  padding:4px 10px;border:1px solid rgba(79,142,247,.3);border-radius:5px;}
.freset:hover{background:rgba(79,142,247,.08);}

/* TABS */
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);
  padding:0 20px;flex-shrink:0;gap:2px;}
.tab{all:unset;box-sizing:border-box;padding:11px 18px;font-size:12.5px;font-weight:500;
  color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .15s,border-color .15s;}
.tab:hover{color:var(--text);}
.tab.on{color:#fff;border-bottom-color:var(--accent);font-weight:600;}

/* PAGES */
.wrap{flex:1;overflow-y:auto;padding:18px 20px;}
.pg{display:none;}.pg.on{display:block;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px 18px;}

/* KPI ROW */
.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px 18px;
  border-top:2px solid var(--border);}
.kpi.k-blue{border-top-color:var(--accent);}
.kpi.k-green{border-top-color:var(--green);}
.kpi.k-amber{border-top-color:var(--amber);}
.kpi.k-red{border-top-color:var(--red);}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px;}
.kpi-val{font-size:32px;font-weight:800;line-height:1;}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:5px;}

/* HERO */
.hero{background:linear-gradient(135deg,var(--card),#0e1422);border:1px solid var(--border);
  border-radius:12px;padding:20px 24px;display:flex;gap:24px;align-items:center;
  margin-bottom:14px;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;
  background:radial-gradient(circle,rgba(79,142,247,.09) 0%,transparent 70%);}
.hero-score{font-size:60px;font-weight:900;line-height:1;flex-shrink:0;}
.hero-r{flex:1;}
.hero-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.hero-band{font-size:14px;font-weight:700;margin-bottom:8px;}
.prog{height:7px;background:var(--border);border-radius:4px;margin-bottom:10px;}
.prog-fill{height:7px;border-radius:4px;}
.hero-meta{display:flex;gap:18px;flex-wrap:wrap;}
.hm{font-size:12px;color:var(--muted);}.hm strong{color:var(--text);}

/* TWO COL */
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}

/* BAR */
.brow{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.blbl{font-size:11px;color:var(--muted);flex:0 0 190px;text-align:right;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btrack{flex:1;height:18px;background:var(--surface);border-radius:3px;overflow:hidden;}
.bfill{height:18px;border-radius:3px;display:flex;align-items:center;padding-left:7px;
  font-size:10px;font-weight:700;color:rgba(255,255,255,.9);min-width:4px;}
.bval{font-size:11px;font-weight:700;flex:0 0 32px;}

/* SCORE PILL */
.sp{display:inline-flex;align-items:center;justify-content:center;
  width:42px;height:20px;border-radius:4px;font-size:11px;font-weight:700;}
.s-r{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.25);}
.s-a{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.25);}
.s-g{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.25);}
.s-b{background:rgba(79,142,247,.15);color:var(--accent);border:1px solid rgba(79,142,247,.25);}

/* CLIENT CARDS */
.cl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:14px;}
.cl-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px 18px;
  border-left:3px solid var(--border);}

/* PROJECT TABLE */
.ptbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
.ptbl th{background:var(--surface);color:var(--muted);font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;padding:9px 12px;text-align:left;
  border-bottom:1px solid var(--border);position:sticky;top:0;}
.ptbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.ptbl tr:last-child td{border-bottom:none;}
.ptbl tr.detail-row td{padding:0;}
.ptbl tr:hover:not(.detail-row) td{background:rgba(255,255,255,.015);}

/* DETAIL PANEL */
.det{display:none;background:var(--surface);border-top:1px solid var(--border);padding:14px 16px;}
.det.open{display:flex;flex-direction:column;gap:14px;}
.area-block{display:flex;flex-direction:column;gap:8px;}
.area-hdr{display:flex;align-items:center;gap:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.area-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;}
.det-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px 13px;
  border-left:3px solid var(--border);}
.det-cat{font-size:12px;font-weight:600;margin-bottom:4px;}
.det-actions{font-size:11px;color:var(--muted);line-height:1.7;background:var(--surface);
  border-radius:5px;padding:8px 10px;}

/* TOGGLE BTN */
.tbtn{all:unset;box-sizing:border-box;font-size:10px;color:var(--accent);cursor:pointer;
  padding:3px 8px;border:1px solid rgba(79,142,247,.25);border-radius:5px;white-space:nowrap;}
.tbtn:hover{background:rgba(79,142,247,.08);}

/* BADGE */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;}
.b-blue{background:rgba(79,142,247,.12);color:var(--accent);border:1px solid rgba(79,142,247,.2);}
.b-purple{background:rgba(139,92,246,.12);color:var(--purple);border:1px solid rgba(139,92,246,.2);}
.b-amber{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.2);}

/* ACTION CARDS */
.ac-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:13px 15px;margin-bottom:9px;}
.ac-card.c-r{border-left:3px solid var(--red);}
.ac-card.c-a{border-left:3px solid var(--amber);}
.ac-card.c-g{border-left:3px solid var(--green);}
.ac-head{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.ac-meta{font-size:10px;color:var(--muted);margin-bottom:3px;}
.ac-title{font-size:13px;font-weight:600;}
.ac-body{display:none;margin-top:10px;background:var(--surface);border-radius:6px;
  padding:10px 12px;font-size:11px;color:var(--muted);line-height:1.8;
  border-left:2px solid var(--accent);}
.ac-body.open{display:block;}
.ac-line{display:flex;gap:5px;}
.ac-line::before{content:'›';color:var(--accent);flex-shrink:0;}

/* SECTION TITLE */
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:var(--muted);margin:0 0 10px;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

@media(max-width:800px){.krow{grid-template-columns:1fr 1fr}.two{grid-template-columns:1fr}}
</style>
</head>

<div id="pw">
  <div class="pw-box">

    <div class="pw-lk">🔐</div>
    <input class="pw-inp" id="pwi" type="password" placeholder="••••••••"/>

    <div class="pw-err" id="pwe"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="brand">Engineering <b>Pulse</b></div>

  </div>

    <select class="fsel" id="fc"><option value="">All Clients</option></select>

    <button class="freset" id="freset">↺ Reset</button>
  </div>

  <div class="tabs">
    <button class="tab on" data-tab="ov">📊 Overview</button>
    <button class="tab" data-tab="pr">📁 Project Drill-Down</button>
    <button class="tab" data-tab="ac">⚡ Action Points</button>
  </div>

  <div class="wrap">
    <div id="ov" class="pg on"></div>
    <div id="pr" class="pg"></div>
    <div id="ac" class="pg"></div>
  </div>
</div>

<script>

// bind password screen

document.getElementById('freset').addEventListener('click', resetF);

// bind tabs
document.querySelectorAll('.tab[data-tab]').forEach(btn =>
  btn.addEventListener('click', () => showTab(btn.dataset.tab))
);

}); // end DOMContentLoaded

const avg=a=>a.length?+(a.reduce((s,v)=>s+v,0)/a.length).toFixed(2):0;

const band=v=>v>=4.5?'Excellent':v>=3.5?'Good':v>=2.5?'Needs Work':'Critical';
const pill=v=>{const c=v>=4.5?'s-b':v>=3.5?'s-g':v>=2.5?'s-a':'s-r';return`<span class="sp ${c}">${v.toFixed(1)}</span>`;};
const pct=(v,m=5)=>Math.round(v/m*100);

// ── INIT ──────────────────────────────────────────────────────
function init(){
  const cl=uniq(DATA.map(r=>r.client)),ar=uniq(DATA.map(r=>r.area)),ca=uniq(DATA.map(r=>r.category));
  const fc=document.getElementById('fc'),fa=document.getElementById('fa'),fcat=document.getElementById('fcat');
  cl.forEach(c=>fc.innerHTML+=`<option>${c}</option>`);
  ar.forEach(a=>fa.innerHTML+=`<option>${a}</option>`);
  ca.forEach(c=>fcat.innerHTML+=`<option>${c}</option>`);
  buildChips();renderAll();
}

function buildChips(){
  const t=avg(DATA.map(r=>r.score));
  document.getElementById('chips').innerHTML=`
    <div class="chip">Score <strong style="color:${sc(t)}">${t.toFixed(2)}/5</strong></div>
    <div class="chip"><strong>${uniq(DATA.map(r=>r.client)).length}</strong> Clients</div>
    <div class="chip"><strong>${uniq(DATA.map(r=>r.project)).length}</strong> Projects</div>`;
}

function applyF(){
  const cl=document.getElementById('fc').value,pr=document.getElementById('fp').value,
        ar=document.getElementById('fa').value,ca=document.getElementById('fcat').value;
  F=DATA.filter(r=>(!cl||r.client===cl)&&(!pr||r.project===pr)&&(!ar||r.area===ar)&&(!ca||r.category===ca));
  if(cl){
    const fp=document.getElementById('fp');
    fp.innerHTML='<option value="">All Projects</option>';
    uniq(DATA.filter(r=>r.client===cl).map(r=>r.project)).forEach(p=>fp.innerHTML+=`<option>${p}</option>`);
  }
  renderAll();
}

function resetF(){
  ['fc','fp','fa','fcat'].forEach(id=>{
    const el=document.getElementById(id);el.value='';
    if(id==='fp')el.innerHTML='<option value="">All Projects</option>';
  });
  F=[...DATA];renderAll();
}

function showTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['ov','pr','ac'][i]===t));
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById(t).classList.add('on');
}

</div>`;
  });

  document.getElementById('pr').innerHTML=html;
}

// ── ACTION POINTS ─────────────────────────────────────────────
function renderAc(){
  const sorted=[...F].sort((a,b)=>a.score-b.score);
  let html=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
    <span class="badge b-blue">${sorted.filter(r=>r.score<2.5).length} Critical</span>
    <span style="display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.2);">${sorted.filter(r=>r.score>=2.5&&r.score<3.5).length} Needs Work</span>
    <span style="display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.2);">${sorted.filter(r=>r.score>=3.5).length} Good / Excellent</span>
  </div>`;

  sorted.forEach((r,i)=>{
    const cls=r.score<2.5?'c-r':r.score<3.5?'c-a':'c-g';
    const dot=r.score<2.5?'🔴':r.score<3.5?'🟡':'🟢';
    html+=`<div class="ac-card ${cls}">
      <div class="ac-head">
        <div>
          <div class="ac-meta">${dot} ${r.client} › ${r.project} › <span class="badge b-purple">${r.area}</span></div>
          <div class="ac-title">${r.category}</div>
        </div>
        <div style="display:flex;gap:7px;align-items:center;flex-shrink:0;">
          ${pill(r.score)}<span class="badge b-amber">→${r.nextLevel}</span>
          <button class="tbtn" onclick="togAc('ab-${i}',this)">▼ Actions</button>
        </div>
      </div>
      <div class="ac-body" id="ab-${i}">
        ${r.actions.split('\n').filter(Boolean).map(a=>`<div class="ac-line">${a.trim()}</div>`).join('')}
      </div>
    </div>`;
  });

  document.getElementById('ac').innerHTML=html;
}

// ── TOGGLE HELPERS (global — called from dynamic innerHTML) ───
function goToProject(clientName){
  showTab('pr');
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['ov','pr','ac'][i]==='pr'));
  // show back button
  const backRow=document.getElementById('pr-back-row');
  if(backRow) backRow.style.display='flex';
  // expand and scroll to the matching client card
  setTimeout(()=>{
    const card=document.querySelector(`[data-client="${clientName}"]`);
    if(card){
      card.scrollIntoView({behavior:'smooth',block:'start'});
      card.style.boxShadow='0 0 0 2px var(--accent)';
      setTimeout(()=>{card.style.boxShadow='';},1800);
    }
  },80);
}
function backToOverview(){
  showTab('ov');
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['ov','pr','ac'][i]==='ov'));
}
function drillDown(id, label, type, rowEl){
  const el=document.getElementById(id);
  if(!el) return;
  const open=el.style.display!=='none';
  // close all other open drill-downs of same type
  document.querySelectorAll('[id^="dr-'+type+'-"]').forEach(d=>{
    if(d.id!==id) d.style.display='none';
  });
  el.style.display=open?'none':'block';
  // highlight active bar row
  rowEl.style.background=open?'':'rgba(79,142,247,.06)';
  rowEl.style.borderRadius='6px';
}
function togDet(id,btn){
  const el=document.getElementById(id);
  const open=el.classList.contains('open');
  el.classList.toggle('open',!open);
  btn.textContent=open?'▼ Expand':'▲ Collapse';
}

function togAc(id,btn){
  const el=document.getElementById(id);
  const open=el.classList.contains('open');
  el.classList.toggle('open',!open);
  btn.textContent=open?'▼ Actions':'▲ Close';
}
</script>
