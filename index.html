<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Engineering Pulse</title>
<style>
:root{
  --bg:#07090f;--surface:#0e1219;--card:#131926;--border:#1a2236;
  --accent:#4f8ef7;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--teal:#06b6d4;
  --text:#e2e8f0;--muted:#6b7a99;--star-on:#f59e0b;--star-off:#2a3352;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

/* PASSWORD */
#pw{display:flex;align-items:center;justify-content:center;height:100vh;
  background:radial-gradient(ellipse at 30% 25%,rgba(79,142,247,.12) 0%,transparent 55%),var(--bg);}
.pw-box{width:380px;background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:44px 40px;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.6);}
.pw-brand{font-size:26px;font-weight:800;margin-bottom:4px;letter-spacing:-.3px;}
.pw-brand b{color:var(--accent);}
.pw-tag{font-size:10.5px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:32px;}
.pw-lk{font-size:34px;margin-bottom:20px;}
.pw-inp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:13px 16px;color:#fff;font-size:15px;text-align:center;letter-spacing:.2em;outline:none;
  margin-bottom:12px;transition:border-color .2s;}
.pw-inp:focus{border-color:var(--accent);}
.pw-btn{width:100%;background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;border:none;border-radius:10px;
  padding:13px;font-weight:700;font-size:14px;cursor:pointer;transition:opacity .2s;}
.pw-btn:hover{opacity:.88;}
.pw-err{color:var(--red);font-size:12px;margin-top:8px;min-height:16px;}

/* LAYOUT */
#app{display:none;height:100vh;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:52px;
  background:#060810;border-bottom:1px solid var(--border);flex-shrink:0;}
.brand{font-size:17px;font-weight:800;letter-spacing:-.2px;}.brand b{color:var(--accent);}
.topbar-right{display:flex;gap:8px;align-items:center;}
.chip{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:4px 12px;font-size:11px;color:var(--muted);}
.chip strong{color:var(--text);font-weight:700;}

/* FILTERS */
.fbar{display:flex;align-items:center;gap:8px;padding:9px 22px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.flbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
select.fsel{background:var(--card);border:1px solid var(--border);border-radius:7px;
  padding:5px 10px;color:var(--text);font-size:12px;outline:none;cursor:pointer;}
select.fsel:focus{border-color:var(--accent);}
.freset{all:unset;box-sizing:border-box;font-size:11px;color:var(--accent);cursor:pointer;
  padding:4px 10px;border:1px solid rgba(79,142,247,.3);border-radius:6px;}
.freset:hover{background:rgba(79,142,247,.08);}

/* TABS */
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);
  padding:0 22px;flex-shrink:0;gap:2px;}
.tab{all:unset;box-sizing:border-box;padding:12px 20px;font-size:12.5px;font-weight:500;
  color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .15s,border-color .15s;}
.tab:hover{color:var(--text);}
.tab.on{color:#fff;border-bottom-color:var(--accent);font-weight:700;}

/* PAGES */
.wrap{flex:1;overflow-y:auto;padding:20px 22px;}
.pg{display:none;}.pg.on{display:block;}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:18px 20px;}

/* STARS */
.stars{display:inline-flex;gap:3px;line-height:1;vertical-align:middle;}
.star{font-size:16px;color:var(--star-off);}
.star.on{color:var(--star-on);}
.stars-sm .star{font-size:13px;}
.stars-lg .star{font-size:26px;}
.stars-xl .star{font-size:42px;}

/* HERO */
.hero{background:linear-gradient(135deg,#0e1422 0%,#111827 100%);border:1px solid var(--border);
  border-radius:16px;padding:26px 28px;display:grid;grid-template-columns:auto 1fr auto;
  gap:30px;align-items:center;margin-bottom:16px;position:relative;overflow:visible;}
.hero::before{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;
  background:radial-gradient(circle,rgba(79,142,247,.06) 0%,transparent 65%);}
.hero-left{text-align:center;z-index:1;min-width:120px;}
.hero-stars{margin-bottom:8px;}
.hero-band{font-size:22px;font-weight:800;letter-spacing:-.3px;}
.hero-lvl{font-size:11px;color:var(--muted);margin-top:4px;}
.hero-mid{z-index:1;}
.hero-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.hero-title{font-size:20px;font-weight:800;margin-bottom:8px;}
.hero-desc{font-size:12.5px;color:var(--muted);line-height:1.7;max-width:400px;margin-bottom:14px;}
.hero-meta{display:flex;gap:20px;flex-wrap:wrap;}
.hm{font-size:12px;color:var(--muted);}.hm strong{color:var(--text);}
.hero-right{z-index:1;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}

/* MATURITY LEGEND */
.mat-legend{display:flex;gap:10px;justify-content:flex-end;}
.mat-pip-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;}
.mat-pip{display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:30px;border-radius:50%;border:2px solid;font-size:11px;
  font-weight:800;cursor:default;}
.mat-pip-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  color:var(--muted);white-space:nowrap;}
.mat-pip-wrap:hover .mat-pip-label{color:var(--text);}
.mat-pip-wrap:hover .mat-tip{display:block;}
.mat-tip{display:none;position:fixed;
  width:240px;background:#1a2236;border:1px solid var(--border);border-radius:10px;
  padding:13px 15px;font-size:11px;line-height:1.65;color:var(--text);
  z-index:99999;box-shadow:0 12px 40px rgba(0,0,0,.7);text-align:left;pointer-events:none;}
.mat-tip strong{display:block;font-size:12px;margin-bottom:5px;}
.mat-tip::after{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);
  border:6px solid transparent;border-bottom-color:#1a2236;}
.mat-desc{font-size:10.5px;color:var(--muted);line-height:1.6;margin-top:10px;
  max-width:240px;text-align:right;}

/* KPI ROW */
.krow{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:18px 20px;
  border-top:3px solid var(--border);}
.kpi.k-red{border-top-color:var(--red);}
.kpi.k-green{border-top-color:var(--green);}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;}
.kpi-val{font-size:36px;font-weight:900;line-height:1;letter-spacing:-1px;}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:6px;}

/* TWO COL */
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}

/* SCORE LIST */
.srow{display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid var(--border);gap:12px;}
.srow:last-child{border-bottom:none;}
.srow-label{font-size:12.5px;color:#fff;font-weight:600;flex:1;}
.srow-label.muted{color:#e2e8f0;font-size:11.5px;font-weight:500;}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;}
.b-blue{background:rgba(79,142,247,.1);color:var(--accent);border:1px solid rgba(79,142,247,.2);}
.b-purple{background:rgba(139,92,246,.18);color:#fff;border:1px solid rgba(139,92,246,.35);font-weight:800;}
.b-teal{background:rgba(6,182,212,.1);color:var(--teal);border:1px solid rgba(6,182,212,.2);}

/* PROJECT TABLE */
.ptbl{width:100%;border-collapse:collapse;font-size:12.5px;}
.ptbl th{background:rgba(255,255,255,.02);color:var(--muted);font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.07em;padding:10px 14px;text-align:left;
  border-bottom:1px solid var(--border);}
.ptbl td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.ptbl tr:last-child td{border-bottom:none;}
.ptbl tr.detail-row td{padding:0;}
.ptbl tr:hover:not(.detail-row) td{background:rgba(255,255,255,.018);}

/* DETAIL PANEL */
.det{display:none;background:var(--surface);border-top:1px solid var(--border);padding:18px 20px;}
.det.open{display:flex;flex-direction:column;gap:18px;}

/* AREA BLOCK */
.area-block{display:flex;flex-direction:column;gap:12px;}
.area-hdr{display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:1px solid var(--border);}

/* CATEGORY CARD — side by side layout */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(460px,1fr));gap:12px;}
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:11px;
  padding:0;overflow:hidden;border-left:3px solid var(--border);}
.cat-card-head{display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:1px solid var(--border);}
.cat-card-body{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.cat-col{padding:12px 14px;}
.cat-col:first-child{border-right:1px solid var(--border);}
.cat-col-hdr{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:8px;}
.cat-col-body{font-size:11.5px;color:var(--muted);line-height:1.75;}
.cat-col-body .line{display:flex;gap:6px;margin-bottom:4px;}
.cat-col-body .line::before{flex-shrink:0;margin-top:1px;}
.cat-col.state .cat-col-hdr{color:var(--teal);}
.cat-col.state .line::before{content:'◦';color:var(--teal);}
.cat-col.actions .cat-col-hdr{color:var(--accent);}
.cat-col.actions .line::before{content:'→';color:var(--accent);}

/* LVL BADGE */
.lvl-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
  border-radius:20px;font-size:10.5px;font-weight:700;border:1px solid;}

/* TOGGLE BTN */
.tbtn{all:unset;box-sizing:border-box;font-size:10px;color:var(--accent);cursor:pointer;
  padding:4px 10px;border:1px solid rgba(79,142,247,.25);border-radius:6px;white-space:nowrap;}
.tbtn:hover{background:rgba(79,142,247,.08);}

/* SECTION TITLE */
.sec-title{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;
  color:#94a3b8;margin:0 0 12px;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

@media(max-width:900px){
  .krow{grid-template-columns:1fr 1fr}
  .two{grid-template-columns:1fr}
  .hero{grid-template-columns:1fr;gap:16px}
  .cat-grid{grid-template-columns:1fr}
  .cat-card-body{grid-template-columns:1fr}
  .cat-col:first-child{border-right:none;border-bottom:1px solid var(--border)}
}
</style>
</head>
<body>

<!-- PASSWORD -->
<div id="pw">
  <div class="pw-box">
    <div class="pw-brand">Engineering <b>Pulse</b></div>
    <div class="pw-tag">Practices Monitoring Dashboard</div>
    <div class="pw-lk">⚙️</div>
    <input class="pw-inp" id="pwi" type="password" placeholder="••••••••"/>
    <button class="pw-btn" id="pw-btn">Unlock Dashboard</button>
    <div class="pw-err" id="pwe"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="brand">Engineering <b>Pulse</b></div>
    
  </div>

  <div class="fbar">

    <select class="fsel" id="fc"><option value="">All Clients</option></select>
    <select class="fsel" id="fp"><option value="">All Projects</option></select>
    <select class="fsel" id="fa"><option value="">All Areas</option></select>
    <select class="fsel" id="fcat"><option value="">All Categories</option></select>
    <button class="freset" id="freset">↺ Reset</button>
  </div>

  <div class="tabs">
    <button class="tab on" data-tab="ov">📊 Overview</button>
    <button class="tab" data-tab="pr">📁 Project Drill-Down</button>
  </div>

  <div class="wrap">
    <div id="ov" class="pg on"></div>
    <div id="pr" class="pg"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('pw-btn').addEventListener('click',auth);
  document.getElementById('pwi').addEventListener('keydown',function(e){if(e.key==='Enter')auth();});
  ['fc','fp','fa','fcat'].forEach(id=>document.getElementById(id).addEventListener('change',applyF));
  document.getElementById('freset').addEventListener('click',resetF);
  document.querySelectorAll('.tab[data-tab]').forEach(btn=>
    btn.addEventListener('click',()=>showTab(btn.dataset.tab)));
});

let F=[...DATA];

// ── HELPERS ───────────────────────────────────────────────────
// rawAvg: true decimal average for accurate aggregation
const rawAvg = a => a.length ? a.reduce((s,v)=>s+v,0)/a.length : 0;
// floorAvg: floor for display — process maturity is an integer scale
const floorAvg = a => Math.floor(rawAvg(a));
const uniq     = a => [...new Set(a)].sort();

// Two-colour scheme: orange = struggling (≤2), green = healthy (>2)
const sc = v => v > 2 ? '#10b981' : '#f59e0b';

// Maturity definitions
const MATURITY = [
  {level:1,label:'Initial',
   desc:'Processes are informal and inconsistent. Success depends on individual effort. Documentation, testing, and standards are limited or absent.'},
  {level:2,label:'Developing',
   desc:'Basic processes exist and are followed by some teams. Documentation, code reviews, testing, and planning occur but are not consistently applied.'},
  {level:3,label:'Defined',
   desc:'Standardised engineering practices are documented and adopted across teams. Roles, responsibilities, architecture guidelines, testing strategies, and delivery processes are well established.'},
  {level:4,label:'Managed',
   desc:'Engineering practices are measured using KPIs and metrics. Teams proactively manage quality, performance, security, technical debt, and delivery predictability using data.'},
  {level:5,label:'Optimised',
   desc:'Continuous improvement is embedded in the culture. Automation, innovation, AI-assisted development, observability, self-service platforms, and proactive optimisation drive engineering excellence.'},
];

function getMat(score){
  const lvl=Math.max(1,Math.min(5,Math.floor(score)));
  return MATURITY[lvl-1];
}

// Stars — coloured based on score (green >2, orange ≤2)
function starsEl(score, cls=''){
  const full=Math.max(0,Math.min(5,Math.floor(score)));
  const empty=5-full;
  const col=score>2?'#10b981':'#f59e0b';
  let s=`<span class="stars ${cls}">`;
  for(let i=0;i<full;i++)  s+=`<span class="star on" style="color:${col};">★</span>`;
  for(let i=0;i<empty;i++) s+=`<span class="star">★</span>`;
  s+=`</span>`;
  return s;
}

function lvlBadge(score){
  const m=getMat(score);
  const c=sc(score);
  return `<span class="lvl-badge" style="color:${c};border-color:${c}40;background:${c}12;">${m.level} · ${m.label}</span>`;
}

  document.getElementById(t).classList.add('on');

      <div class="mat-tip" id="${tipId}"><strong style="color:${c2}">${m.level} — ${m.label}</strong>${m.desc}</div>
    </div>`;
  }).join('');

  document.getElementById('ov').innerHTML=`

<!-- HERO -->
<div class="hero">
  <div class="hero-left">
    <div class="hero-stars">${starsEl(total,'stars-xl')}</div>
    <div class="hero-lvl">Level ${mat.level} of 5</div>
  </div>
  <div class="hero-mid">
    <div class="hero-lbl">Overall Engineering Health</div>
    <div class="hero-title" style="color:${col}">${mat.label}</div>
    <div class="hero-desc">${mat.desc}</div>
    <div class="hero-meta">
      <div class="hm"><strong>${clients.length}</strong> Clients</div>
      <div class="hm"><strong>${projs.length}</strong> Projects</div>
      <div class="hm"><strong style="color:#f59e0b">${crit}</strong> Need Attention</div>
      <div class="hm"><strong style="color:#10b981">${excel}</strong> Excellent</div>
    </div>
  </div>
  <div class="hero-right">
    <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;text-align:right;">Maturity Scale</div>
    <div class="mat-legend">${matPips}</div>
  </div>
</div>

<!-- KPI ROW -->
<div class="krow">
  <div class="kpi k-red">
    <div class="kpi-lbl">Need Attention</div>
    <div class="kpi-val" style="color:#f59e0b">${crit}</div>
    <div class="kpi-sub">Projects at Level 1 or 2</div>
  </div>
  <div class="kpi k-green">
    <div class="kpi-lbl">Excellent</div>
    <div class="kpi-val" style="color:#10b981">${excel}</div>
    <div class="kpi-sub">Projects at Level 4 or 5</div>
  </div>
</div>

<!-- CLIENT + AREA -->

// ── PROJECT DRILL-DOWN ────────────────────────────────────────
function renderPr(){
  const d=F;
  const clientList=uniq(d.map(r=>r.client));

  // Sort clients worst first
  const byClient=clientList
    .map(cl=>{
      const crows=d.filter(r=>r.client===cl);
      const cavg=floorAvg(crows.map(r=>r.score));
      // Sort projects worst first
      const projs=uniq(crows.map(r=>r.project))
        .map(p=>{const rows=crows.filter(r=>r.project===p);return{p,sc:floorAvg(rows.map(r=>r.score)),rows};})
        .sort((a,b)=>a.sc-b.sc);
      return{cl,projs,cavg};
    })
    .sort((a,b)=>a.cavg-b.cavg);

  let html='';
  let idx=0;

  byClient.forEach(({cl,projs,cavg})=>{
    let tbody='';
    projs.forEach(({p,sc:psc,rows})=>{
      const did=`det-${idx++}`;
      const pmat=getMat(psc);
      const pcol=sc(psc);

      // Group by Area (sorted worst first)
      const areas=uniq(rows.map(r=>r.area));
      const areasSorted=[...areas]
        .map(a=>({a,s:floorAvg(rows.filter(r=>r.area===a).map(r=>r.score))}))
        .sort((a,b)=>a.s-b.s)
        .map(x=>x.a);

      const detHtml=areasSorted.map(area=>{
        const aRows=rows.filter(r=>r.area===area);
        const aScore=floorAvg(aRows.map(r=>r.score));
        const acol=sc(aScore);

        // Sort categories worst first
        const catsSorted=[...aRows].sort((a,b)=>a.score-b.score);

        const catCards=catsSorted.map(row=>{
          const rcol=sc(row.score);
          const stateLines=(row.currentState||'').split('\n').filter(Boolean);
          const actionLines=(row.actions||'').split('\n').filter(Boolean);
          return`<div class="cat-card" style="border-left-color:${rcol};">
            <div class="cat-card-head">
              <div style="font-size:13px;font-weight:700;">${row.category}</div>
              <div style="display:flex;align-items:center;gap:8px;">
                ${starsEl(row.score,'stars-sm')}
                ${lvlBadge(row.score)}
              </div>
            </div>
            <div class="cat-card-body">
              <div class="cat-col state">
                <div class="cat-col-hdr">Current State</div>
                <div class="cat-col-body">
                  ${stateLines.length
                    ? stateLines.map(l=>`<div class="line">${l.trim()}</div>`).join('')
                    : '<span style="opacity:.4;font-size:11px;">—</span>'}
                </div>
              </div>
              <div class="cat-col actions">
                <div class="cat-col-hdr">Action Points</div>
                <div class="cat-col-body">
                  ${actionLines.length
                    ? actionLines.map(a=>`<div class="line">${a.trim()}</div>`).join('')
                    : '<span style="opacity:.4;font-size:11px;">—</span>'}
                </div>
              </div>
            </div>
          </div>`;
        }).join('');

        return`<div class="area-block">
          <div class="area-hdr">
            <span class="badge b-purple">${area}</span>
            ${starsEl(aScore,'stars-sm')}
            ${lvlBadge(aScore)}
          </div>
          <div class="cat-grid">${catCards}</div>
        </div>`;
      }).join('');

      tbody+=`<tr>
        <td style="font-weight:700;">${p}</td>
        <td>${starsEl(psc,'stars-sm')}</td>
        <td>${lvlBadge(psc)}</td>
        <td><button class="tbtn" onclick="togDet('${did}',this)">▼ Expand</button></td>
      </tr>
      <tr class="detail-row"><td colspan="4">
        <div class="det" id="${did}">${detHtml}</div>
      </td></tr>`;
    });

    html+=`
<div class="card" data-client="${cl}" style="margin-bottom:16px;overflow:visible;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="font-size:15px;font-weight:800;color:var(--accent);">${cl}</div>
      <span class="badge b-blue">${projs.length} project${projs.length>1?'s':''}</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      ${starsEl(cavg,'stars-sm')}
      ${lvlBadge(cavg)}
    </div>
  </div>
  <table class="ptbl">
    <colgroup>
      <col style="width:35%;"><col style="width:25%;"><col style="width:28%;"><col style="width:12%;">
    </colgroup>
    <thead><tr>
      <th>Project</th><th>Score</th><th>Level</th><th></th>
    </tr></thead>
    <tbody>${tbody}</tbody>
  </table>
</div>`;
  });

  document.getElementById('pr').innerHTML=html;
}

// ── MATURITY TOOLTIP (fixed position — escapes overflow:hidden) ──
function showMatTip(e, id){
  const el=document.getElementById(id);
  if(!el) return;
  el.style.display='block';
  moveMatTip(e, id);
}
function hideMatTip(id){
  const el=document.getElementById(id);
  if(el) el.style.display='none';
}
function moveMatTip(e, id){
  const el=document.getElementById(id);
  if(!el||el.style.display==='none') return;
  const tw=el.offsetWidth||240;
  const th=el.offsetHeight||120;
  let left=e.clientX - tw/2;
  let top =e.clientY + 20;  // below cursor instead of above
  // Clamp horizontally to viewport
  left=Math.max(8, Math.min(left, window.innerWidth-tw-8));
  // If it would go off bottom, show above instead
  if(top + th > window.innerHeight - 8) top = e.clientY - th - 14;
  el.style.left=left+'px';
  el.style.top =top+'px';
}

function togDet(id,btn){
  const el=document.getElementById(id);
  const open=el.classList.contains('open');
  el.classList.toggle('open',!open);
  btn.textContent=open?'▼ Expand':'▲ Collapse';
}

function goToClient(el){
  const clientName=el.dataset.clientName;
  showTab('pr');
  setTimeout(()=>{
    const card=document.querySelector(`[data-client="${clientName}"]`);
    if(card){
      card.scrollIntoView({behavior:'smooth',block:'start'});
      card.style.boxShadow='0 0 0 2px var(--accent)';
      setTimeout(()=>{card.style.boxShadow='';},1800);
    }
  },80);
}
